name: Update VPN Configs

# This workflow lives in the PUBLIC "showcase" repo (e.g. vpn-configs).
# It pulls the private Docker image built from the source repo and runs it
# to regenerate live_merged.txt. The source code never leaves the private repo.
#
# Required repository secrets:
#   GHCR_TOKEN  — Personal Access Token (classic) with `read:packages` scope,
#                 belonging to the same account that owns the source repo.
#                 Settings → Developer settings → Personal access tokens →
#                 Tokens (classic) → Generate new token (classic).
#                 (The default GITHUB_TOKEN of THIS public repo cannot read
#                 packages owned by ANOTHER repo even within the same account.)
#
# Required repository variables (Settings → Secrets and variables → Actions → Variables):
#   IMAGE          — full image reference, e.g. `ghcr.io/<owner>/vpn-aggregator:latest`
#   GHCR_USERNAME  — GitHub username that owns the source repo / the GHCR_TOKEN
#
# Required file in this repo:
#   sources.txt    — your subscription URLs, one per line. This is the ONLY
#                    sensitive bit you keep in the public repo. If you don't
#                    want it public either, store it as a secret SOURCES_TXT
#                    and switch to the alternative step below.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-configs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull aggregator image
        run: docker pull "${{ vars.IMAGE }}"

      # --- OPTION A: sources.txt is committed to this repo (default) ---------
      - name: Verify sources.txt exists
        run: |
          if [ ! -f sources.txt ]; then
            echo "::error::sources.txt is missing. Add it to the repo (or switch to OPTION B in the workflow)."
            exit 1
          fi
          echo "sources.txt: $(wc -l < sources.txt) lines"

      # --- OPTION B (alternative): keep sources.txt in a secret -------------
      # Comment out OPTION A above, uncomment below, and add a repo secret
      # named SOURCES_TXT containing your subscription URLs.
      #
      # - name: Materialize sources.txt from secret
      #   run: |
      #     printf '%s\n' "${{ secrets.SOURCES_TXT }}" > sources.txt
      #     echo "sources.txt: $(wc -l < sources.txt) lines"
      # ----------------------------------------------------------------------

      - name: Run aggregator
        run: |
          set -euo pipefail
          mkdir -p out
          cp sources.txt out/sources.txt
          # bun (uid 1000 in image) vs runner (uid 1001 on host) → use host uid
          chmod 0777 out
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/out:/work" \
            -e PROBE_URL="https://www.gstatic.com/generate_204" \
            "${{ vars.IMAGE }}" -c 64
          ls -la out
          test -s out/live_merged.txt
          mv out/live_merged.txt live_merged.txt
          wc -l live_merged.txt
          head -n 3 live_merged.txt || true

      - name: Commit & push if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live_merged.txt
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          STAMP="$(date -u +'%Y-%m-%d %H:%M')"
          git commit -m "ci: update configs [${STAMP}]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live_merged
          path: live_merged.txt
          if-no-files-found: warn
          retention-days: 7
